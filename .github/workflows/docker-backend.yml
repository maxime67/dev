name: Build Backend

on:
  push:
    branches: [main, tp2]
  pull_request:
    branches: [main, tp2]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:latest ./backend
      - name: Scan backend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table \
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:latest
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:latest