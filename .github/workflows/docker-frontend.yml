name: Build Frontend

on:
  push:
    branches: [main, tp2]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, tp2]
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-frontend ./frontend
