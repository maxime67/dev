name: pre-commit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source du repo dans la VM
      - uses: actions/checkout@v4

      # Installe Python 3.12
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Idem que l'éxecution local
      - uses: pre-commit/action@v4.5.1
