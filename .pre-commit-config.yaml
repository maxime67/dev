repos:
  # PYTHON : Linter et formateur
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      # Linte le code Python et corrige automatiquement les erreurs
      - id: ruff
        args: [--fix]   # Permet d'appliquer des modifs ?
        files: ^backend/

      # Formate le code Python
      - id: ruff-format
        files: ^backend/

  # JAVASCRIPT / HTML / CSS : Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8 # Version à revoir
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, html, css]

  # HOOKS GÉNÉRAUX
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Supprime les espaces inutiles
      - id: trailing-whitespace
      - id: end-of-file-fixer
      # Syntaxe yaml
      - id: check-yaml
      - id: detect-private-key